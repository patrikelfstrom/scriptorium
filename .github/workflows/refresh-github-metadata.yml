name: Refresh Catalog Data

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-catalog-data-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10

jobs:
  refresh:
    strategy:
      fail-fast: false
      matrix:
        shard_slot: [0, 1]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Select shard
        env:
          SHARD_SLOT: ${{ matrix.shard_slot }}
          NPM_SYNC_SHARD_COUNT: 14
        run: |
          epoch_day=$(( $(date -u +%s) / 86400 ))
          shard_index=$(( (epoch_day * 2 + SHARD_SLOT) % NPM_SYNC_SHARD_COUNT ))
          echo "NPM_SYNC_SHARD_INDEX=$shard_index" >> "$GITHUB_ENV"
          echo "Selected shard $(( shard_index + 1 ))/$NPM_SYNC_SHARD_COUNT for epoch day $epoch_day."

      - name: Refresh npm catalog data
        env:
          NPM_SYNC_TOP_PACKAGE_LIMIT: 30000
          NPM_SYNC_SHARD_COUNT: 14
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TURSO_DATABASE_URL: ${{ vars.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: pnpm sync:npm-catalog
